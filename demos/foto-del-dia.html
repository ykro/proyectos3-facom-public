<!doctype html><html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  .appbar{display:flex;align-items:flex-start;gap:12px}
  .appbar .ic{font-size:30px;line-height:1}
  .stage{padding:18px 18px 0}
  .hero{height:300px;border-radius:22px;position:relative;overflow:hidden;
    display:flex;align-items:center;justify-content:center;font-size:88px;
    box-shadow:0 12px 28px rgba(109,46,70,.22)}
  .hero .hoy{position:absolute;top:14px;left:14px;background:rgba(255,255,255,.92);color:var(--vino)}
  .hero .grad{position:absolute;left:0;right:0;bottom:0;height:90px;
    background:linear-gradient(to top,rgba(43,43,43,.55),transparent)}
  .hero .cap{position:absolute;left:16px;bottom:14px;color:#fff;font-size:14px;font-weight:700;
    text-shadow:0 1px 4px rgba(0,0,0,.4)}
  .stats{display:flex;gap:10px;padding:16px 18px 4px;justify-content:center}
  .stats .pill{font-size:13px;padding:8px 14px}
  .cta{padding:14px 18px 0}
  .cta .btn{padding:16px;font-size:16px;border-radius:16px;box-shadow:0 8px 20px rgba(109,46,70,.28)}
  .hint{text-align:center;font-size:12px;color:var(--muted);margin-top:12px}
</style></head>
<body>
  <div class="statusbar"><span>9:41</span><span class="icons">📶 &nbsp;🔋</span></div>
  <div class="appbar">
    <div class="ic">📷</div>
    <div>
      <h1>Foto del Día</h1>
      <div class="sub">Jueves 2 de julio</div>
    </div>
  </div>

  <div class="stage">
    <div class="hero g6">
      <span>🌄</span>
      <span class="badge b-alpaso hoy">Hoy</span>
      <div class="grad"></div>
      <div class="cap">Amanecer sobre el Volcán de Agua</div>
    </div>
  </div>

  <div class="stats">
    <span class="pill">🔥 7 días seguidos</span>
    <span class="pill">📸 128 fotos</span>
  </div>

  <div class="cta">
    <div class="btn">Tomar la foto de hoy</div>
    <div class="hint">Un momento cada día. No lo dejes pasar.</div>
  </div>

  <div class="navbar">
    <div class="item active"><span class="ic">📷</span>Hoy</div>
    <div class="item"><span class="ic">🖼️</span>Galería</div>
    <div class="item"><span class="ic">👤</span>Perfil</div>
  </div>
</body></html>
