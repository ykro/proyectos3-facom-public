<!doctype html><html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  .appbar{display:flex;align-items:flex-start;gap:12px}
  .appbar .ic{font-size:30px;line-height:1}
  .grid{padding:16px 16px 84px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .tile{background:var(--card);border-radius:16px;overflow:hidden;
    box-shadow:0 4px 14px rgba(109,46,70,.10);border:1px solid #f3eadc}
  .tile .cover{height:150px;display:flex;align-items:center;justify-content:center;font-size:46px;position:relative}
  .tile .cover .spine{position:absolute;left:0;top:0;bottom:0;width:7px;background:rgba(0,0,0,.16)}
  .tile .info{padding:9px 11px 12px}
  .tile .t{font-size:14px;font-weight:800;line-height:1.2;letter-spacing:-.2px}
  .tile .a{font-size:11.5px;color:var(--muted);margin-top:3px}
  .tile .stars{font-size:11px;color:var(--mostaza);margin-top:6px;letter-spacing:1px}
</style></head>
<body>
  <div class="statusbar"><span>9:41</span><span class="icons">📶 &nbsp;🔋</span></div>
  <div class="appbar">
    <div class="ic">📚</div>
    <div>
      <h1>Mi Estantería</h1>
      <div class="sub">Los libros que he leído</div>
    </div>
  </div>

  <div class="grid">
    <div class="tile">
      <div class="cover g1"><span class="spine"></span>📕</div>
      <div class="info">
        <div class="t">El Señor Presidente</div>
        <div class="a">M. A. Asturias</div>
        <div class="stars">★★★★★</div>
      </div>
    </div>

    <div class="tile">
      <div class="cover g5"><span class="spine"></span>📖</div>
      <div class="info">
        <div class="t">Cien años de soledad</div>
        <div class="a">G. García Márquez</div>
        <div class="stars">★★★★★</div>
      </div>
    </div>

    <div class="tile">
      <div class="cover g3"><span class="spine"></span>📗</div>
      <div class="info">
        <div class="t">Rayuela</div>
        <div class="a">J. Cortázar</div>
        <div class="stars">★★★★☆</div>
      </div>
    </div>

    <div class="tile">
      <div class="cover g4"><span class="spine"></span>📘</div>
      <div class="info">
        <div class="t">Pedro Páramo</div>
        <div class="a">J. Rulfo</div>
        <div class="stars">★★★★★</div>
      </div>
    </div>

    <div class="tile">
      <div class="cover g2"><span class="spine"></span>📙</div>
      <div class="info">
        <div class="t">La casa de los espíritus</div>
        <div class="a">I. Allende</div>
        <div class="stars">★★★★☆</div>
      </div>
    </div>

    <div class="tile">
      <div class="cover g6"><span class="spine"></span>📕</div>
      <div class="info">
        <div class="t">El túnel</div>
        <div class="a">E. Sábato</div>
        <div class="stars">★★★★☆</div>
      </div>
    </div>
  </div>

  <div class="fab" style="bottom:80px">＋</div>
  <div class="navbar">
    <div class="item active"><span class="ic">📚</span>Estante</div>
    <div class="item"><span class="ic">🔍</span>Buscar</div>
    <div class="item"><span class="ic">👤</span>Perfil</div>
  </div>
</body></html>
