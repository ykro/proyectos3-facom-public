<!doctype html><html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  .appbar{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .appbar .titles h1{font-size:24px}
  .avatar{width:40px;height:40px;border-radius:50%;background:var(--mostaza);color:#3a2c00;
    display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;
    flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.18);border:2px solid rgba(255,255,255,.4)}
  .grid{padding:16px 16px 90px;display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .tile{border-radius:16px;overflow:hidden;box-shadow:0 6px 16px rgba(109,46,70,.14);
    position:relative;height:172px;display:flex;flex-direction:column;justify-content:flex-end}
  .tile .emoji{position:absolute;top:12px;left:13px;font-size:30px}
  .tile .cap{background:linear-gradient(transparent,rgba(0,0,0,.55));padding:22px 12px 12px;color:#fff}
  .tile .cap .name{font-size:14.5px;font-weight:800;letter-spacing:-.2px;line-height:1.15}
  .tile .cap .date{font-size:11.5px;opacity:.9;margin-top:2px}
</style></head>
<body>
  <div class="statusbar"><span>9:41</span><span class="icons">📶 &nbsp;🔋</span></div>
  <div class="appbar">
    <div class="titles">
      <h1>Diario de Viajes</h1>
      <div class="sub">Tus viajes, solo para ti</div>
    </div>
    <div class="avatar">MG</div>
  </div>

  <div class="grid">
    <div class="tile g3"><span class="emoji">🏞️</span><div class="cap"><div class="name">Semuc Champey</div><div class="date">12 mar 2026</div></div></div>
    <div class="tile g6"><span class="emoji">🗿</span><div class="cap"><div class="name">Tikal</div><div class="date">3 feb 2026</div></div></div>
    <div class="tile g5"><span class="emoji">⛪</span><div class="cap"><div class="name">Antigua</div><div class="date">18 ene 2026</div></div></div>
    <div class="tile g4"><span class="emoji">🌋</span><div class="cap"><div class="name">Lago Atitlán</div><div class="date">27 dic 2025</div></div></div>
    <div class="tile g1"><span class="emoji">🚤</span><div class="cap"><div class="name">Río Dulce</div><div class="date">9 nov 2025</div></div></div>
    <div class="tile g2"><span class="emoji">🔥</span><div class="cap"><div class="name">Volcán de Pacaya</div><div class="date">21 oct 2025</div></div></div>
  </div>

  <div class="fab">📷</div>

  <div class="navbar">
    <div class="item active"><span class="ic">📔</span>Diario</div>
    <div class="item"><span class="ic">🗺️</span>Mapa</div>
    <div class="item"><span class="ic">👤</span>Perfil</div>
  </div>
</body></html>
